services:
  agentmemory-mcp-bridge:
    build: .
    image: agentmemory-mcp-bridge:0.1-nas
    restart: unless-stopped
    command:
      - --pass-environment
      - --host=0.0.0.0
      - --port=8014
      - --log-level=INFO
      - --
      - agentmemory-mcp
    environment:
      AGENTMEMORY_URL: http://192.168.123.104:3111
      AGENTMEMORY_SECRET: b95898290680a1692d32ac04ee7757e393076231ce6adc6abcf6943bc1026836
      AGENTMEMORY_TOOLS: "all"
    ports:
      - "0.0.0.0:8014:8014"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8014 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
